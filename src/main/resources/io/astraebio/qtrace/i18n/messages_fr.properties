license.inactive.body=qTrace continue en mode Core — la capture et le stamp restent disponibles, mais les fonctions de certification et de conformité (certificat signé, chaîne de traçabilité, push workspace) sont désactivées. Renouvelez votre licence dans votre espace pour les réactiver.

# Rapport d'activité — confirmation avant envoi (sécurité/audit)
report.confirm.title=qTrace — Vérifier les données avant l'envoi
report.confirm.notice=Ce rapport est généré en envoyant les données ci-dessous à Claude (Anthropic) via le portail qTrace. Seules des métadonnées de provenance sont transmises — jamais les pixels de l'image, la géométrie des annotations, les matrices d'alignement, ni votre nom d'utilisateur/machine. Anthropic n'utilise pas ces données pour l'entraînement, et le portail peut imposer la zero-rétention. Vérifiez le contenu exact avant l'envoi.
report.confirm.pseudonymize=Pseudonymiser les noms des contributeurs et de l'image
report.confirm.soon=(bientôt disponible)
report.confirm.language=Langue du rapport :
report.confirm.dontask=Ne plus me demander (réactivable dans Réglages → Sécurité)
report.confirm.cancel=Annuler
report.confirm.send=Envoyer à Claude


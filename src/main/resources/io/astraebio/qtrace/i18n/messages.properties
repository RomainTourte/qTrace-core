# Activity report — pre-send confirmation (security/audit)
report.confirm.title=qTrace — Review data before sending
report.confirm.notice=This report is generated by sending the data below to Claude (Anthropic) via the qTrace portal. Only provenance metadata is transmitted — never the image pixels, annotation geometry, alignment matrices, or your OS user/machine name. Anthropic does not use this data for training, and the portal can enforce zero data retention. Review the exact payload before sending.
